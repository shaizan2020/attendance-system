version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-system
    ports:
      - "8085:8085"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
